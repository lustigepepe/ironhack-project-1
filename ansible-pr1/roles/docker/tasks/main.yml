---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - apt-transport-https
    state: present

- name: Remove old Docker repository files (prevent duplicates)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.list.old
    - /etc/apt/sources.list.d/docker.list.save

- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Add Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker official repository
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release
      }} stable"
    filename: docker
    state: present
    update_cache: yes

- name: Update apt cache after adding repo
  apt:
    update_cache: yes
    cache_valid_time: 0

- name: Install Docker Engine and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  retries: 5
  delay: 10
  register: docker_install
  until: docker_install is succeeded

- name: Enable and start Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Reboot if needed to apply group changes
  reboot:
    msg: "Rebooting to apply docker group membership"
    timeout: 300
  when:
    - ansible_user != "root"
    - ansible_facts['user_id'] != "0"
    - ansible_connection != "local" # ← Add this line to prevent reboot during debug
