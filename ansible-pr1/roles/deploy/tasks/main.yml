- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy docker-compose.yml to remote host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/docker-compose.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Login to Docker registry
  community.docker.docker_login:
    username: "{{ docker_username | default(omit) }}"
    password: "{{ docker_password | default(omit) }}"
  no_log: true
  when: docker_username is defined
# ====================== DEPLOY ======================
- name: Pull latest images and start services (Clean Deploy)
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    services: "{{ services_to_deploy | default(omit) }}"
    state: present
    pull: always
    recreate: always
    remove_orphans: true
    force_recreate: true # Extra force
  register: compose_result
  retries: 3
  delay: 15
  until: compose_result is success
  environment:
    DOCKER_CLI_VERBOSE: "1"

- name: Display compose deployment result
  ansible.builtin.debug:
    var: compose_result
    verbosity: 1

- name: Show running containers
  ansible.builtin.command: docker compose ps
  args:
    chdir: "{{ app_dir }}"
  changed_when: false
  register: compose_ps

- name: Display containers status
  ansible.builtin.debug:
    msg: "{{ compose_ps.stdout_lines }}"
