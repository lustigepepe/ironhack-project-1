---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install tzdata first (critical for timezone module)
  ansible.builtin.apt:
    name: tzdata
    state: present
    update_cache: yes

- name: Install minimal essential packages
  apt:
    name:
      - curl
      - git
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
    state: present

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Remove unnecessary packages
  apt:
    autoremove: yes
    purge: yes
  register: autoremove_result

- name: Clean apt cache
  apt:
    autoclean: yes
