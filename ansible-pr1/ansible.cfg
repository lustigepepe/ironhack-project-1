[defaults]
# collections_paths = ./collections
collections_paths = /usr/share/ansible/collections:~/.ansible/collections   # ← System + User paths
vault_password_file = vault_pass.txt
inventory = inventory/aws_ec2.yml
host_key_checking = False
timeout = 60
forks = 10
remote_user = ubuntu
connection = local

# Performance & SSM friendliness
fact_caching = memory
fact_caching_timeout = 3600
display_skipped_hosts = False